name: CLI Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build CLI runtime
        run: pnpm build:cli

      - name: Run tests
        run: pnpm test -- --run tests/main/node-headless.test.ts tests/main/headless-mcp.test.ts tests/main/db/migrations.test.ts

      - name: Pack source tarball
        run: npm pack

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-release
          path: |
            *.tgz
            bin/aa-cli.mjs
            docs/hermes-aa-cli.md
          if-no-files-found: error

  release:
    needs: build-cli
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout for release notes
        uses: actions/checkout@v4
        with:
          sparse-checkout: RELEASE_NOTES.md
          sparse-checkout-cone-mode: false

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*.tgz
            artifacts/aa-cli.mjs
            artifacts/hermes-aa-cli.md
